# Docker Hub credentials secret used by Kaniko build Jobs
# The .docker/config.json format is required by Kaniko for registry auth
{{- if .Values.dockerhub.username }}
apiVersion: v1
kind: Secret
metadata:
  name: dockerhub-credentials
  namespace: {{ .Values.instanceNamespace }}
  labels:
    {{- include "codeserver.labels" . | nindent 4 }}
    app.kubernetes.io/component: workspace
type: Opaque
stringData:
  config.json: |
    {"auths":{"https://index.docker.io/v1/":{"auth":"{{ printf "%s:%s" .Values.dockerhub.username .Values.dockerhub.password | b64enc }}"}}}
{{- end }}
