apiVersion: v1
kind: Service
metadata:
  name: zot
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: zot
    app.kubernetes.io/instance: {{ .Release.Name }}
