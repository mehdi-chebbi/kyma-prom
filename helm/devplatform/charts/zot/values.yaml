image:
  repository: ghcr.io/project-zot/zot
  tag: "v2.1.15"
  pullPolicy: IfNotPresent

namespace: zot

service:
  type: ClusterIP
  port: 5000

persistence:
  enabled: true
  storage: 20Gi
  storageClassName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Zot configuration (embedded as JSON)
config:
  distSpecVersion: "1.1.0"
  storage:
    rootDirectory: /var/lib/registry
    gc: true
    gcDelay: "1h"
    gcInterval: "24h"
    dedupe: true
  http:
    address: "0.0.0.0"
    port: "5000"
  log:
    level: info
  extensions:
    metrics:
      enable: true
      prometheus:
        path: /metrics
    search:
      enable: true
    ui:
      enable: true
