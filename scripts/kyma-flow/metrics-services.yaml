---
# ClusterIP Service for LDAP Manager Metrics (internal access)
apiVersion: v1
kind: Service
metadata:
  name: ldap-manager-metrics
  namespace: dev-platform
  labels:
    app: ldap-manager
    component: metrics
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: ldap-manager

